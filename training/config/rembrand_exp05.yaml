exp_name: rembrand_lora_r16_no_reproj_newdata
# EXP-05: Reproduce EXP-01 on the new (clean) dataset.
#
# EXP-01 was the best overall baseline on tracking_whisper_sample_dataset:
#   camera=0.5, depth=0.5, track=1.0, reproj=null
#   val track loss: 0.063 (E95 best)
#   2D ATE: vanilla 2.00px -> finetuned 1.34px  (-34%)
#   3D reproj_ATE: 1.74px -> 5.78px (+232%) — camera head degraded by COLMAP noise
#
# Purpose of EXP-05:
#   Establish the COLMAP-supervised no-reproj baseline on tracking_whisper_clean_dataset
#   so EXP-03/04 self-supervised results have a fair comparison.
#   "Clean dataset" = tracking_whisper_clean_dataset (114 train / 26 val sequences).
#
# Differences vs original EXP-01:
#   - Dataset: tracking_whisper_clean_dataset (larger, cleaner) vs sample_dataset (83/20)
#   - gradient_clip: tightened depth/camera to 0.5 (EXP-01 had G_dep 50-150 pre-clip)
#   - limit_train_batches=50, limit_val_batches=20 (consistent with EXP-03/04)
#
# Key question this answers:
#   Does the stronger dataset alone improve over EXP-01's -34% ATE?
#   Is the camera degradation (+232% reproj_ATE) reproducible on the clean dataset?

img_size: 518
num_workers: 8
seed_value: 42
accum_steps: 1
patch_size: 14
val_epoch_freq: 5
max_img_per_gpu: 48

limit_train_batches: 50
limit_val_batches:   20


data:
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    shuffle: True
    pin_memory: False
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      fix_img_num: -1
      fix_aspect_ratio: 1.0
      load_track: True
      track_num: 256
      use_gt_tracks: True
      use_depth_tracks: False
      training: True
      inside_random: True
      rescale: True
      rescale_aug: True
      landscape_check: False
      debug: False
      get_nearby: False
      load_depth: True           # depth.weight=0.5 requires depth maps
      img_nums: [8, 24]
      max_img_per_gpu: ${max_img_per_gpu}
      allow_duplicate_img: False
      repeat_batch: False
      augs:
        cojitter: True
        cojitter_ratio: 0.3
        scales: [0.8, 1.2]
        aspects: [0.5625, 0.5625]
        color_jitter:
          brightness: 0.3
          contrast:   0.3
          saturation: 0.3
          hue:        0.05
          p: 0.8
        gray_scale: True
        gau_blur: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.colmap.ColmapDataset
          split: train
          DATASET_DIR: /mnt/bucket/dawy/vggt_finetune/tracking_whisper_clean_dataset/
          depth_dir_name: depth
          sequence_list_file: /mnt/bucket/dawy/vggt_finetune/tracking_whisper_clean_dataset/train_split.txt

  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    shuffle: False
    pin_memory: False
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      fix_img_num: -1
      fix_aspect_ratio: 1.0
      load_track: True
      track_num: 256
      use_gt_tracks: True
      use_depth_tracks: False
      training: False
      inside_random: True
      rescale: True
      rescale_aug: False
      landscape_check: False
      debug: False
      get_nearby: False
      load_depth: True
      img_nums: [8, 16]
      allow_duplicate_img: False
      augs:
        cojitter: False
        cojitter_ratio: 0.5
        scales: null
        aspects: [0.5625, 0.5625]
        color_jitter: null
        gray_scale: False
        gau_blur: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.colmap.ColmapDataset
          split: val
          DATASET_DIR: /mnt/bucket/dawy/vggt_finetune/tracking_whisper_clean_dataset/
          depth_dir_name: depth
          sequence_list_file: /mnt/bucket/dawy/vggt_finetune/tracking_whisper_clean_dataset/val_split.txt


logging:
  log_dir: /mnt/bucket/dawy/law_parallax_vggt_exp1/${exp_name}
  log_visuals: False
  log_freq: 1
  log_level_primary: DEBUG
  log_level_secondary: WARNING
  all_ranks: False
  tensorboard_writer:
    _target_: train_utils.tb_writer.TensorBoardLogger
    path: ${logging.log_dir}/tensorboard
  scalar_keys_to_log:
    train:
      keys_to_log:
        - objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth
        - loss_mask_conf_depth
        - loss_track
        - loss_vis_track
        - loss_conf_track
    val:
      keys_to_log:
        - objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_track
        - loss_vis_track
        - loss_conf_track


checkpoint:
  save_dir: /mnt/bucket/dawy/law_parallax_vggt_exp2/no_reproj_baseline/${exp_name}/ckpts
  save_freq: 5
  resume_checkpoint_path: null
  no_resume: true
  strict: False


loss:
  _target_: loss.MultitaskLoss

  camera:
    weight: 0.5             # EXP-01 value — COLMAP supervision
    loss_type: "l1"

  depth:
    weight: 0.5             # EXP-01 value — ViPE depth supervision
    gradient_loss_fn: "none"
    valid_range: 0.95
    alpha: 1.0
    invalid_conf_weight: 0.0
    invalid_conf_target: 1.0
    invalid_conf_loss_type: "l2"

  point: null

  track:
    weight: 1.0

  reproj: null               # EXP-01: no reproj loss

  plane_rigidity: null


optim:
  param_group_modifiers: False

  optimizer:
    _target_: torch.optim.AdamW
    lr: 5e-5
    weight_decay: 0.05

  frozen_module_names: null

  amp:
    enabled: True
    amp_dtype: bfloat16

  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["aggregator"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["depth"]
        max_norm: 0.5          # Tightened from EXP-01 — G_dep hit 50-150 in EXP-01, 388 in EXP-03
        norm_type: 2
      - module_name: ["camera"]
        max_norm: 0.5          # Tightened — camera oscillated in EXP-01/02
        norm_type: 2
      - module_name: ["track"]
        max_norm: 1.0
        norm_type: 2

  lora:
    pretrained_checkpoint_path: /workspace/low_parallax_vggt/model.pt
    r: 16
    lora_alpha: 32
    target_modules:
      - qkv
      - proj
    lora_dropout: 0.0
    fresh_heads: False

  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-8
              end_value: 5e-5
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: 5e-5
              end_value: 1e-8
          lengths: [0.05, 0.95]
          interval_scaling: ['rescaled', 'rescaled']
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.05


max_epochs: 100


model:
  _target_: vggt.models.vggt.VGGT
  enable_camera: True
  enable_depth: True
  enable_point: False
  enable_track: True


distributed:
  backend: nccl
  comms_dtype: None
  find_unused_parameters: False
  timeout_mins: 30
  gradient_as_bucket_view: True
  bucket_cap_mb: 25
  broadcast_buffers: True

cuda:
  cudnn_deterministic: False
  cudnn_benchmark: False
  allow_tf32: True
