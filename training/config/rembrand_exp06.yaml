exp_name: rembrand_lora_r16_reproj_plane_v1
# EXP-06: Reprojection loss + plane rigidity for true 3D self-supervision.
#
# Motivation (from EXP-04 / EXP-04b diagnosis):
#
#   consistency_weight alone does not drive Grad/depth — the pretrained VGGT
#   model already satisfies cross-frame consistency (loss ~0.001) because it
#   can trivially collapse depth to a constant across frames.  The gradient is
#   so small it rounds to 0.0000 in logging.
#
#   The reprojection loss cannot be gamed the same way:
#     unproject(track_0, pred_depth_0, K_0, E_0) → P_world
#     reproject(P_world, K_j, E_j) must match gt_track_j
#   Collapsing depth to a constant makes reprojection fail unless camera also
#   collapses — which violates the track loss.  This coupled constraint forces
#   depth AND camera to be jointly accurate.
#
# Why reproj was unstable before (EXP-01..03):
#   It ran simultaneously with the COLMAP camera loss — two conflicting sources
#   of camera supervision.  COLMAP labels are noisy for low-parallax scenes, so
#   the COLMAP loss pulled camera predictions in the wrong direction while reproj
#   tried to correct them, creating large opposing gradients → NaNs.
#
# This experiment: reproj + plane_rigidity, NO camera loss, NO depth loss.
#   - reproj     : weight 0.1  (conservative; gradient flows to depth + camera)
#   - plane_rigidity: weight 0.3, consistency only (structural regularizer)
#   - track      : weight 0.5  (2D anchor, prevents solution collapse)
#   - camera     : weight 0.0  (no COLMAP supervision)
#   - depth      : null        (confidence exploit not yet solved)
#
# Expected signals:
#   - Grad/depth  > 0.1   (reproj back-propagates through depth head)
#   - Grad/camera > 0.05  (reproj back-propagates through camera head)
#   - loss_reproj decreasing from ~20-50px → <10px by ep10
#   - val/loss_track ≤ 0.12 at ep5 (track should not regress)
#   - No NaN / explosion — gradient clips are tighter on camera + depth

img_size: 518
num_workers: 8
seed_value: 42
accum_steps: 1
patch_size: 14
val_epoch_freq: 5
max_img_per_gpu: 48

limit_train_batches: 50
limit_val_batches:   20


data:
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    shuffle: True
    pin_memory: False
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      fix_img_num: -1
      fix_aspect_ratio: 1.0
      load_track: True
      track_num: 256
      use_gt_tracks: True
      use_depth_tracks: False
      training: True
      inside_random: True
      rescale: True
      rescale_aug: True
      landscape_check: False
      debug: False
      get_nearby: False
      load_depth: False
      img_nums: [8, 24]
      max_img_per_gpu: ${max_img_per_gpu}
      allow_duplicate_img: False
      repeat_batch: False
      augs:
        cojitter: True
        cojitter_ratio: 0.3
        scales: [0.8, 1.2]
        aspects: [0.5625, 0.5625]
        color_jitter:
          brightness: 0.3
          contrast:   0.3
          saturation: 0.3
          hue:        0.05
          p: 0.8
        gray_scale: True
        gau_blur: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.colmap.ColmapDataset
          split: train
          DATASET_DIR: /mnt/bucket/dawy/vggt_finetune/tracking_whisper_clean_dataset/
          depth_dir_name: depth
          sequence_list_file: /mnt/bucket/dawy/vggt_finetune/tracking_whisper_clean_dataset/train_split.txt

  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    shuffle: False
    pin_memory: False
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      fix_img_num: -1
      fix_aspect_ratio: 1.0
      load_track: True
      track_num: 256
      use_gt_tracks: True
      use_depth_tracks: False
      training: False
      inside_random: True
      rescale: True
      rescale_aug: False
      landscape_check: False
      debug: False
      get_nearby: False
      load_depth: False
      img_nums: [8, 16]
      allow_duplicate_img: False
      augs:
        cojitter: False
        cojitter_ratio: 0.5
        scales: null
        aspects: [0.5625, 0.5625]
        color_jitter: null
        gray_scale: False
        gau_blur: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.colmap.ColmapDataset
          split: val
          DATASET_DIR: /mnt/bucket/dawy/vggt_finetune/tracking_whisper_clean_dataset/
          depth_dir_name: depth
          sequence_list_file: /mnt/bucket/dawy/vggt_finetune/tracking_whisper_clean_dataset/val_split.txt


logging:
  log_dir: /mnt/bucket/dawy/law_parallax_vggt_exp1/${exp_name}
  log_visuals: False
  log_freq: 1
  log_level_primary: DEBUG
  log_level_secondary: WARNING
  all_ranks: False
  tensorboard_writer:
    _target_: train_utils.tb_writer.TensorBoardLogger
    path: ${logging.log_dir}/tensorboard
  scalar_keys_to_log:
    train:
      keys_to_log:
        - objective
        - loss_reproj
        - loss_plane_rigidity
        - loss_track
        - loss_vis_track
        - loss_conf_track
    val:
      keys_to_log:
        - objective
        - loss_reproj
        - loss_plane_rigidity
        - loss_track
        - loss_vis_track
        - loss_conf_track


checkpoint:
  save_dir: /mnt/bucket/dawy/law_parallax_vggt_exp2/reproj_plane/${exp_name}/ckpts
  save_freq: 5
  resume_checkpoint_path: null
  no_resume: true
  strict: False


loss:
  _target_: loss.MultitaskLoss

  camera:
    weight: 0.0             # No COLMAP supervision — noisy labels destabilize reproj
    loss_type: "l1"

  depth: null               # Confidence exploit not yet solved; keep null

  point: null

  track:
    weight: 0.5             # 2D anchor — prevents depth/camera from collapsing

  reproj:
    weight: 0.1             # Conservative start — reproj gradients to depth+camera
                            # can be large early in training when cameras are off.
                            # Raise to 0.2-0.3 in EXP-06b if ep5 is stable.

  plane_rigidity:
    weight: 0.3             # Structural regularizer on top of reproj
    consistency_weight: 1.0 # Cross-frame 3D consistency (depth + camera jointly)
    plane_weight: 0.0       # SVD plane fitting still disabled (Grad/camera spike in EXP-03b)
    min_visible_frames: 2


optim:
  param_group_modifiers: False

  optimizer:
    _target_: torch.optim.AdamW
    lr: 5e-5
    weight_decay: 0.05

  frozen_module_names: null

  amp:
    enabled: True
    amp_dtype: bfloat16

  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["aggregator"]
        max_norm: 0.5
        norm_type: 2
      - module_name: ["depth"]
        max_norm: 0.3          # Tighter than EXP-04b (0.5) — reproj drives depth harder
        norm_type: 2
      - module_name: ["camera"]
        max_norm: 0.3          # Tighter — reproj camera gradients can spike early
        norm_type: 2
      - module_name: ["track"]
        max_norm: 0.1
        norm_type: 2

  lora:
    pretrained_checkpoint_path: /workspace/low_parallax_vggt/model.pt
    r: 16
    lora_alpha: 32
    target_modules:
      - qkv
      - proj
    lora_dropout: 0.0
    fresh_heads: False

  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-8
              end_value: 5e-5
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: 5e-5
              end_value: 1e-8
          lengths: [0.05, 0.95]
          interval_scaling: ['rescaled', 'rescaled']
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.05


max_epochs: 100


model:
  _target_: vggt.models.vggt.VGGT
  enable_camera: True
  enable_depth: True
  enable_point: False
  enable_track: True


distributed:
  backend: nccl
  comms_dtype: None
  find_unused_parameters: False
  timeout_mins: 30
  gradient_as_bucket_view: True
  bucket_cap_mb: 25
  broadcast_buffers: True

cuda:
  cudnn_deterministic: False
  cudnn_benchmark: False
  allow_tf32: True
