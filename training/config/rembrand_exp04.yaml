exp_name: rembrand_lora_r16_plane_rigidity_v3
# EXP-04: Track + plane rigidity only — no depth loss.
#
# Root-cause fixes from EXP-03a/03b post-mortem (ep~13 analysis):
#
# 1. depth: null  (was weight=0.1)
#    EXP-03a/03b: loss_conf_depth collapsed from +0.18 → -2.8 by ep13.
#    The depth confidence head exploited the free negative reward from the
#    ViPE confidence term, overriding the plane rigidity and track signals.
#    Removing depth loss entirely eliminates this exploit.
#
# 2. track.max_norm: 0.3  (was 1.0)
#    EXP-03a: Grad/track reached 25 post-clip — actual norm was 25× budget.
#    The clip was firing but the clipped gradient was still large enough to
#    cause loss_track spikes to 1.3 (ep13 max). Tightening to 0.3 puts the
#    clip closer to the nominal operating range (~0.1-0.5 observed).
#
# 3. plane_rigidity.weight: 0.3  (was 0.1)
#    EXP-03a/03b: loss_plane_rigidity ~0.02 with weight=0.1 → contribution
#    to objective was <0.003 (0.3% of total). Too weak to shape depth/camera.
#    Raised to 0.3 (consistent with EXP-03b which held train/loss_track better).
#
# 4. plane_weight: 0.0  (same as EXP-03a)
#    EXP-03b: SVD plane fitting caused Grad/camera spikes to 251 on near-coplanar
#    low-parallax batches — even with camera.weight=0.0. Keep disabled.
#
# Expected behaviour:
#   - loss_conf_depth no longer logged (depth=null).
#   - loss_track should descend monotonically without confidence-exploit interference.
#   - Grad/track should stay ≤0.5 post-clip (monitor; if still HIGH raise further).
#   - val/loss_track ep~5 target: ≤0.12 (match EXP-03 best); ep~15 target: ≤0.10.

img_size: 518         # 1920×1080 → 518×291 at 16:9 (scale ≈0.27×).
num_workers: 8
seed_value: 42
accum_steps: 1
patch_size: 14
val_epoch_freq: 5
max_img_per_gpu: 48   # floor(48/S) = batch_size. S=24 → bs=2, S=8 → bs=6.

limit_train_batches: 50    # ceil(114 train seqs / floor(48/16)) = ceil(114/3) = 38 — one full pass per epoch
limit_val_batches:   20     # ceil(26 val seqs   / floor(48/12)) = ceil(26/4) = 7  [val avg_img=12 from [8,16]]


data:
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    shuffle: True
    pin_memory: False
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      fix_img_num: -1
      fix_aspect_ratio: 1.0
      load_track: True
      track_num: 256         # Reduced from 3654 to avoid OOM in tracker correlation (B*S*N*H*W matmul)
      use_gt_tracks: True    # Use pre-computed AE tracks (tracks.npy / track_masks.npy)
      use_depth_tracks: False
      training: True
      inside_random: True
      rescale: True
      rescale_aug: True      # Scale aug is safe — intrinsics updated consistently by resize_image_depth_and_intrinsic
      landscape_check: False
      debug: False
      get_nearby: False      # False: spread frames across full sequence — captures full motion baseline for low-parallax
      load_depth: False      # depth: null — no depth loss, no need to load depth maps
      img_nums: [8, 24]      # Min 8: low-parallax needs accumulated motion; max 24 for dense supervision
      max_img_per_gpu: ${max_img_per_gpu}
      allow_duplicate_img: False
      repeat_batch: False
      augs:
        cojitter: True
        cojitter_ratio: 0.3
        scales: [0.8, 1.2]         # Random scale aug ±20% — safe, intrinsics updated accordingly
        aspects: [0.5625, 0.5625]  # Fixed 16:9 (1080/1920). Keeps track coords in-bounds.
        color_jitter:
          brightness: 0.3
          contrast:   0.3
          saturation: 0.3
          hue:        0.05
          p: 0.8
        gray_scale: True
        gau_blur: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.colmap.ColmapDataset
          split: train
          DATASET_DIR: /mnt/bucket/dawy/vggt_finetune/tracking_whisper_clean_dataset/
          depth_dir_name: depth
          sequence_list_file: /mnt/bucket/dawy/vggt_finetune/tracking_whisper_clean_dataset/train_split.txt

  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    shuffle: False
    pin_memory: False
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      fix_img_num: -1
      fix_aspect_ratio: 1.0
      load_track: True
      track_num: 256
      use_gt_tracks: True
      use_depth_tracks: False
      training: False
      inside_random: True
      rescale: True
      rescale_aug: False
      landscape_check: False
      debug: False
      get_nearby: False
      load_depth: False      # depth: null — consistent with train
      img_nums: [8, 16]
      allow_duplicate_img: False
      augs:
        cojitter: False
        cojitter_ratio: 0.5
        scales: null
        aspects: [0.5625, 0.5625]
        color_jitter: null
        gray_scale: False
        gau_blur: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.colmap.ColmapDataset
          split: val
          DATASET_DIR: /mnt/bucket/dawy/vggt_finetune/tracking_whisper_clean_dataset/
          depth_dir_name: depth
          sequence_list_file: /mnt/bucket/dawy/vggt_finetune/tracking_whisper_clean_dataset/val_split.txt


logging:
  log_dir: /mnt/bucket/dawy/law_parallax_vggt_exp1/${exp_name}
  log_visuals: False
  log_freq: 1
  log_level_primary: DEBUG
  log_level_secondary: WARNING
  all_ranks: False
  tensorboard_writer:
    _target_: train_utils.tb_writer.TensorBoardLogger
    path: ${logging.log_dir}/tensorboard
  scalar_keys_to_log:
    train:
      keys_to_log:
        - objective
        - loss_plane_rigidity
        - loss_track
        - loss_vis_track
        - loss_conf_track
    val:
      keys_to_log:
        - objective
        - loss_plane_rigidity
        - loss_track
        - loss_vis_track
        - loss_conf_track
# depth loss keys removed — depth: null means they will never appear in loss_dict.


checkpoint:
  save_dir: /mnt/bucket/dawy/law_parallax_vggt_exp2/plane_rigidity/${exp_name}/ckpts
  save_freq: 5
  resume_checkpoint_path: null  # Fresh start — diagnostic run from pretrained base only
  no_resume: true               # Never auto-resume from save_dir (avoids corrupt ckpt on restart)
  strict: False


loss:
  _target_: loss.MultitaskLoss

  camera:
    weight: 0.0             # COLMAP supervision dropped — proven to destroy 3D geometry in low-parallax (EXP-01/02)
    loss_type: "l1"

  depth: null               # EXP-04: removed entirely — confidence exploit drove loss_conf_depth to -2.8 in EXP-03

  point: null

  track:
    weight: 1.0             # Primary signal — proven +34% 2D ATE improvement

  reproj: null

  plane_rigidity:
    weight: 0.3             # Raised from 0.1 — at 0.1 the term was <0.003 of objective (too quiet to shape depth/camera)
    consistency_weight: 1.0 # Point consistency term — per-track L2 deviation from cross-frame mean
    plane_weight: 0.0       # SVD plane fitting disabled — caused Grad/camera spikes to 251 in EXP-03b
    min_visible_frames: 2   # Track must be visible in ≥2 frames to contribute


optim:
  param_group_modifiers: False

  optimizer:
    _target_: torch.optim.AdamW
    lr: 5e-5
    weight_decay: 0.05

  frozen_module_names: null

  amp:
    enabled: True
    amp_dtype: bfloat16

  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["aggregator"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["depth"]
        max_norm: 0.5
        norm_type: 2
      - module_name: ["camera"]
        max_norm: 0.5
        norm_type: 2
      - module_name: ["track"]
        max_norm: 0.3          # Tightened from 1.0 — Grad/track was reaching 25 post-clip in EXP-03a (spikes to loss=1.3)
        norm_type: 2

  lora:
    pretrained_checkpoint_path: /workspace/low_parallax_vggt/model.pt
    r: 16
    lora_alpha: 32
    target_modules:
      - qkv
      - proj
    lora_dropout: 0.0
    fresh_heads: False

  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-8
              end_value: 5e-5
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: 5e-5
              end_value: 1e-8
          lengths: [0.05, 0.95]
          interval_scaling: ['rescaled', 'rescaled']
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.05


max_epochs: 100


model:
  _target_: vggt.models.vggt.VGGT
  enable_camera: True
  enable_depth: True
  enable_point: False
  enable_track: True


distributed:
  backend: nccl
  comms_dtype: None
  find_unused_parameters: False
  timeout_mins: 30
  gradient_as_bucket_view: True
  bucket_cap_mb: 25
  broadcast_buffers: True

cuda:
  cudnn_deterministic: False
  cudnn_benchmark: False
  allow_tf32: True
