defaults:
  - default_dataset.yaml

exp_name: exp001
img_size: 518 # The long side of the image (the width). The height is not fixed — it's determined by the aspect ratio sampled per batch:aspects
num_workers: 8
seed_value: 42
accum_steps: 2    # We did not use gradient accumulation in our training, while if you suffer from OOM, you can try to use it.
patch_size: 14    # The ViT patch size. Images must be divisible by this. All resizing logic ensures that.
val_epoch_freq: 5  # Run validation every 5 epochs, not every epoch. Saves time.
max_img_per_gpu: 48 # The budget for how many images fit on one GPU per step. The actual batch size is computed dynamically as floor(48 / num_frames_per_sequence). So if a sequence has 4 frames → batch_size=12, if 24 frames → batch_size=2.

limit_train_batches: 800 # Cap the training loop at 800 iterations per epoch, even if the dataset has more.
limit_val_batches: 400 #Cap the validation loop at 400 iterations per epoch, even if the dataset has more. This is especially useful if your validation set is large and you want to save time during training. You can set it to 1.0 to use the entire validation set, or to an integer to specify the exact number of batches to use.


data: # The data section has two parallel blocks — train and val. Each is a 3-layer stack:
  train: # 1st block (train)
    _target_: data.dynamic_dataloader.DynamicTorchDataset # Layer 1: DataLoader wrapper: Owns the DataLoader. Gets num_workers, max_img_per_gpu, and common_config. Handles the dynamic batch sizing.
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: False
      repeat_batch: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset # Layer 2: ComposedDataset wrapper: Sits between the DataLoader and dataset. Handles: Converting numpy → tensors, Color augmentation, Track loading (if enabled), Aspect ratio sampling, Rescaling
      dataset_configs:
        - _target_: data.datasets.co3d.Co3dDataset # Layer 3: The actual dataset
          split: train
          CO3D_DIR: /YOUR/PATH/TO/CO3D
          CO3D_ANNOTATION_DIR: /YOUR/PATH/TO/CO3D_ANNOTATION
  val: # 2nd block (val)
    _target_: data.dynamic_dataloader.DynamicTorchDataset # Layer 1: DataLoader wrapper
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset # Layer 2: ComposedDataset wrapper
      dataset_configs:
        - _target_: data.datasets.co3d.Co3dDataset # Layer 3: The actual dataset
          split: test
          CO3D_DIR: /YOUR/PATH/TO/CO3D
          CO3D_ANNOTATION_DIR: /YOUR/PATH/TO/CO3D_ANNOTATION


logging:
  log_dir: logs
  log_visuals: False
  log_freq: 1
  log_level_primary: DEBUG
  log_level_secondary: WARNING
  all_ranks: False
  tensorboard_writer:
    _target_: train_utils.tb_writer.TensorBoardLogger
    path: ${logging.log_dir}/tensorboard
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth
    val:
      keys_to_log:
        - loss_objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth



checkpoint:
  save_dir: logs/${exp_name}/ckpts
  save_freq: 5
  resume_checkpoint_path: /YOUR/PATH/TO/CKPT
  strict: False


loss:
  _target_: loss.MultitaskLoss
  camera: 
    weight: 5.0
    loss_type: "l1" # The paper uses smooth l1 loss, but we found l1 loss is more stable than smooth l1 and l2 loss.  
  depth:
    weight: 1.0
    gradient_loss_fn: "grad"
    valid_range: 0.98
    invalid_conf_weight: 0.0    # set > 0 to penalize high conf at masked pixels (plane + dynamic objects)
    invalid_conf_target: 1.0    # minimum conf value for expp1 activation
    invalid_conf_loss_type: "l2"
  point: null
  # If you want to enable point, use the following config
  # point: 
  #   weight: 1.0
  #   gradient_loss_fn: "normal" 
  #   valid_range: 0.98
  track: null
  reproj: null
  # To enable reprojection loss (requires load_track: True and tracks.npy in dataset):
  # reproj:
  #   weight: 2.0


optim:
  param_group_modifiers: False # If True, allows different learning rates per parameter group 

  optimizer:
    _target_: torch.optim.AdamW
    lr: 5e-5
    weight_decay: 0.05

  frozen_module_names:
      - "*aggregator*"  # Freezes the entire ViT backbone. The * is a glob pattern so it matches any module name containing "aggregator".

  amp:
    enabled: True
    amp_dtype: bfloat16
  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["aggregator"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
      - module_name: ["depth"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
      - module_name: ["camera"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-8
              end_value: 5e-5
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: 5e-5
              end_value: 1e-8
          lengths: [0.05, 0.95]
          interval_scaling: ['rescaled', 'rescaled']
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.05




max_epochs: 20

model:
  _target_: vggt.models.vggt.VGGT
  enable_camera: True
  enable_depth: True
  enable_point: False
  enable_track: False


distributed:
  # check https://docs.pytorch.org/docs/stable/generated/torch.nn.parallel.DistributedDataParallel.html for options
  backend: nccl
  comms_dtype: None
  find_unused_parameters: False # change this when using LoRA
  timeout_mins: 30
  gradient_as_bucket_view: True  # Less memory used
  bucket_cap_mb: 25
  broadcast_buffers: True

cuda:
    cudnn_deterministic: False
    cudnn_benchmark: False
    allow_tf32: True
