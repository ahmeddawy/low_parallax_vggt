exp_name: rembrand_lora_r16_reproj_plane_homography_v1
# EXP-09: EXP-06 base + homography consistency loss (Track A).
#
# Base: EXP-06 (track + reproj + plane_rigidity, LR=5e-5)
#   - Best 2D tracking so far: val/loss_track=0.0526 at ep90
#   - Stable: no NaN, healthy Grad/* throughout
#
# New: L_homography — plane-at-infinity camera consistency
#   H_0→t = K_t_orig @ R_rel @ K_0_orig^{-1}
#   Apply H to frame-0 GT tracks (original resolution) → compare to frame-t GT tracks.
#   No depth in the loop → gradient flows to camera head (R, K) only.
#   Complements reproj (which supervises depth + t) and plane_rigidity (depth smoothness).
#
# Design choices:
#   - Loss evaluated at original image resolution (K scaled from model → original res)
#   - weight=0.1: same scale as reproj — conservative start
#   - No translation in H (plane-at-infinity): valid for low-parallax regime
#   - Mixed-plane tracks averaged out across N tracks per frame
#
# Expected signals:
#   - Grad/camera should increase slightly (second supervision source for R, K)
#   - Grad/depth unchanged (no depth in homography path)
#   - val/loss_track ≤ EXP-06 (should not regress 2D tracking)
#   - loss_homography decreasing from first epoch

img_size: 518
num_workers: 8
seed_value: 42
accum_steps: 1
patch_size: 14
val_epoch_freq: 5
max_img_per_gpu: 48

limit_train_batches: 50
limit_val_batches:   20


data:
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    shuffle: True
    pin_memory: False
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      fix_img_num: -1
      fix_aspect_ratio: 1.0
      load_track: True
      track_num: 256
      use_gt_tracks: True
      use_depth_tracks: False
      training: True
      inside_random: True
      rescale: True
      rescale_aug: True
      landscape_check: False
      debug: False
      get_nearby: False
      load_depth: False
      img_nums: [8, 24]
      max_img_per_gpu: ${max_img_per_gpu}
      allow_duplicate_img: False
      repeat_batch: False
      augs:
        cojitter: True
        cojitter_ratio: 0.3
        scales: [0.8, 1.2]
        aspects: [0.5625, 0.5625]
        color_jitter:
          brightness: 0.3
          contrast:   0.3
          saturation: 0.3
          hue:        0.05
          p: 0.8
        gray_scale: True
        gau_blur: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.colmap.ColmapDataset
          split: train
          DATASET_DIR: /mnt/bucket/dawy/vggt_finetune/tracking_whisper_clean_dataset/
          depth_dir_name: depth
          sequence_list_file: /mnt/bucket/dawy/vggt_finetune/tracking_whisper_clean_dataset/train_split.txt

  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    shuffle: False
    pin_memory: False
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      fix_img_num: -1
      fix_aspect_ratio: 1.0
      load_track: True
      track_num: 256
      use_gt_tracks: True
      use_depth_tracks: False
      training: False
      inside_random: True
      rescale: True
      rescale_aug: False
      landscape_check: False
      debug: False
      get_nearby: False
      load_depth: False
      img_nums: [8, 16]
      allow_duplicate_img: False
      augs:
        cojitter: False
        cojitter_ratio: 0.5
        scales: null
        aspects: [0.5625, 0.5625]
        color_jitter: null
        gray_scale: False
        gau_blur: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.colmap.ColmapDataset
          split: val
          DATASET_DIR: /mnt/bucket/dawy/vggt_finetune/tracking_whisper_clean_dataset/
          depth_dir_name: depth
          sequence_list_file: /mnt/bucket/dawy/vggt_finetune/tracking_whisper_clean_dataset/val_split.txt


logging:
  log_dir: /mnt/bucket/dawy/law_parallax_vggt_exp1/${exp_name}
  log_visuals: False
  log_freq: 1
  log_level_primary: DEBUG
  log_level_secondary: WARNING
  all_ranks: False
  tensorboard_writer:
    _target_: train_utils.tb_writer.TensorBoardLogger
    path: ${logging.log_dir}/tensorboard
  scalar_keys_to_log:
    train:
      keys_to_log:
        - objective
        - loss_reproj
        - loss_plane_rigidity
        - loss_homography
        - loss_track
        - loss_vis_track
        - loss_conf_track
    val:
      keys_to_log:
        - objective
        - loss_reproj
        - loss_plane_rigidity
        - loss_homography
        - loss_track
        - loss_vis_track
        - loss_conf_track


checkpoint:
  save_dir: /mnt/bucket/dawy/law_parallax_vggt_exp2/reproj_plane_homography/${exp_name}/ckpts
  save_freq: 5
  resume_checkpoint_path: null
  no_resume: true
  strict: False


loss:
  _target_: loss.MultitaskLoss

  camera: null

  depth: null

  point: null

  track:
    weight: 1.0

  reproj:
    weight: 0.1

  plane_rigidity:
    weight: 0.3
    consistency_weight: 1.0
    plane_weight: 0.0
    min_visible_frames: 2

  homography:
    weight: 0.1             # Same scale as reproj — conservative start

  depth_consistency: null


optim:
  param_group_modifiers: False

  optimizer:
    _target_: torch.optim.AdamW
    lr: 5e-5
    weight_decay: 0.05

  frozen_module_names: null

  amp:
    enabled: True
    amp_dtype: bfloat16

  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["aggregator"]
        max_norm: 0.5
        norm_type: 2
      - module_name: ["depth"]
        max_norm: 0.3
        norm_type: 2
      - module_name: ["camera"]
        max_norm: 0.1
        norm_type: 2
      - module_name: ["track"]
        max_norm: 0.1
        norm_type: 2

  lora:
    pretrained_checkpoint_path: /workspace/low_parallax_vggt/model.pt
    r: 16
    lora_alpha: 32
    target_modules:
      - qkv
      - proj
    lora_dropout: 0.0
    fresh_heads: False

  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-8
              end_value: 5e-5
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: 5e-5
              end_value: 1e-8
          lengths: [0.05, 0.95]
          interval_scaling: ['rescaled', 'rescaled']
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.05


max_epochs: 100


model:
  _target_: vggt.models.vggt.VGGT
  enable_camera: True
  enable_depth: True
  enable_point: False
  enable_track: True


distributed:
  backend: nccl
  comms_dtype: None
  find_unused_parameters: True
  timeout_mins: 30
  gradient_as_bucket_view: True
  bucket_cap_mb: 25
  broadcast_buffers: True

cuda:
  cudnn_deterministic: False
  cudnn_benchmark: False
  allow_tf32: True
