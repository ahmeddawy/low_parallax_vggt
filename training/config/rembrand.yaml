exp_name: rembrand_lora_r16_no_reproj_diag
# Diagnostic experiment: reproj disabled to isolate whether instability originates from reproj loss.
# Supervision: ViPE masked depth + COLMAP camera + direct track head supervision. No reproj loss.
# If training is stable here, reproj loss is the instability source.
# v2: depth weight 0.5, depth clip 0.5, track_num 256, invalid_conf_weight 0.0, NaN batch skip.
# v3: gradient_loss_fn disabled ("none") — "grad" was spiking at plane-mask boundaries.
# v4: reproj NaN gradient fix (sampled_depth clamp + analytical K^{-1}).
# v5: alpha raised 0.5→1.0, camera grad clip tightened 1.0→0.5.
# v6: camera.weight set to 0.0 (COLMAP unreliable).
# diag: reproj.weight set to 0.0 — isolate standard losses (depth + camera + track).
img_size: 518         # 1920×1080 → 518×291 at 16:9 (scale ≈0.27×). 1 model-px ≈ 3.7 original-px → ~4px precision floor.
num_workers: 8
seed_value: 42
accum_steps: 1
patch_size: 14
val_epoch_freq: 5
max_img_per_gpu: 48   # floor(48/S) = batch_size. S=24 → bs=2, S=8 → bs=6.

limit_train_batches: 28    # ceil(83 train seqs / floor(48/16)) = ceil(83/3) = 28 — one full pass per epoch
limit_val_batches:   5     # ceil(20 val seqs   / floor(48/12)) = ceil(20/4) = 5  [val avg_img=12 from [8,16]]


data:
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    shuffle: True
    pin_memory: False
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      fix_img_num: -1
      fix_aspect_ratio: 1.0
      load_track: True
      track_num: 256         # Reduced from 3654 to avoid OOM in tracker correlation (B*S*N*H*W matmul)
      use_gt_tracks: True    # Use pre-computed AE tracks (tracks.npy / track_masks.npy)
      use_depth_tracks: False
      training: True
      inside_random: True
      rescale: True
      rescale_aug: True      # Scale aug is safe — intrinsics updated consistently by resize_image_depth_and_intrinsic
      landscape_check: False
      debug: False
      get_nearby: False      # False: spread frames across full sequence — captures full motion baseline for low-parallax
      load_depth: True
      img_nums: [8, 24]      # Min 8: low-parallax needs accumulated motion; max 24 for dense supervision
      max_img_per_gpu: ${max_img_per_gpu}
      allow_duplicate_img: False
      repeat_batch: False
      augs:
        cojitter: True
        cojitter_ratio: 0.3
        scales: [0.8, 1.2]         # Random scale aug ±20% — safe, intrinsics updated accordingly
        aspects: [0.5625, 0.5625]  # Fixed 16:9 (1080/1920). Keeps track coords in-bounds.
        color_jitter:
          brightness: 0.3
          contrast:   0.3
          saturation: 0.3
          hue:        0.05
          p: 0.8
        gray_scale: True
        gau_blur: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.colmap.ColmapDataset
          split: train
          DATASET_DIR: /mnt/bucket/dawy/vggt_finetune/tracking_whisper_sample_dataset/
          depth_dir_name: masked_depth
          sequence_list_file: /mnt/bucket/dawy/vggt_finetune/tracking_whisper_sample_dataset/train_split.txt  # direct file path (one seq name per line)

  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    shuffle: False
    pin_memory: False
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      fix_img_num: -1
      fix_aspect_ratio: 1.0
      load_track: True
      track_num: 256
      use_gt_tracks: True
      use_depth_tracks: False
      training: False
      inside_random: True
      rescale: True
      rescale_aug: False
      landscape_check: False
      debug: False
      get_nearby: False
      load_depth: True
      img_nums: [8, 16]
      allow_duplicate_img: False
      augs:
        cojitter: False
        cojitter_ratio: 0.5
        scales: null
        aspects: [0.5625, 0.5625]
        color_jitter: null
        gray_scale: False
        gau_blur: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.colmap.ColmapDataset
          split: val
          DATASET_DIR: /mnt/bucket/dawy/vggt_finetune/tracking_whisper_sample_dataset/
          depth_dir_name: masked_depth
          sequence_list_file: /mnt/bucket/dawy/vggt_finetune/tracking_whisper_sample_dataset/val_split.txt


logging:
  log_dir: /mnt/bucket/dawy/law_parallax_vggt_exp1/${exp_name}
  log_visuals: False
  log_freq: 1
  log_level_primary: DEBUG
  log_level_secondary: WARNING
  all_ranks: False
  tensorboard_writer:
    _target_: train_utils.tb_writer.TensorBoardLogger
    path: ${logging.log_dir}/tensorboard
  scalar_keys_to_log:
    train:
      keys_to_log:
        - objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth
        - loss_mask_conf_depth
        - loss_reproj
        - loss_track
        - loss_vis_track
        - loss_conf_track
    val:
      keys_to_log:
        - objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth
        - loss_mask_conf_depth
        - loss_reproj
        - loss_track
        - loss_vis_track
        - loss_conf_track


checkpoint:
  save_dir: /workspace/low_parallax_vggt/ckpts/${exp_name}
  save_freq: 5
  # Weights are loaded inside _setup_lora() before PEFT wrapping — do NOT also load here.
  resume_checkpoint_path: null  # Fresh start — diagnostic run from pretrained base only
  strict: False


loss:
  _target_: loss.MultitaskLoss

  camera:
    weight: 0.5             # Restored for diagnostic — COLMAP provides weak anchor while reproj is disabled
    loss_type: "l1"

  depth:
    weight: 0.5                # Reduced from 1.0 — depth grad loss was exploding (norm 388 pre-clip), causing NaN reprojection
    gradient_loss_fn: "none"       # Disabled: "grad" spikes at plane-mask boundaries (valid→0 transitions), causing loss_grad_depth→4+ and NaN reproj
    valid_range: 0.95          # More aggressive outlier filtering — pseudo GT depth (ViPE) has more noise than LiDAR
    alpha: 1.0                 # Raised from 0.5 — conf_eq = alpha/loss_reg; needs alpha > loss_reg to stay above expp1 min 1.0. Some batches have loss_reg≈0.65 → alpha=0.5 gives conf_eq=0.77 < 1.0 → collapse. alpha=1.0 → conf_eq≥1 as long as loss_reg≤1.0.
    invalid_conf_weight: 0.0    # Disabled: was collapsing conf→1.0 everywhere (outdoor seqs have sparse valid depth)
    invalid_conf_target: 1.0    # expp1 activation minimum = 1.0
    invalid_conf_loss_type: "l2"

  point: null

  track:
    weight: 1.0

  reproj:
    weight: 0.0   # Disabled for diagnostic — testing stability without reproj


optim:
  param_group_modifiers: False

  optimizer:
    _target_: torch.optim.AdamW
    # Heads (pretrained) get gentle updates; LoRA adapters (new) benefit from the higher
    # effective LR = lr × (lora_alpha / r) = 5e-5 × 2 = 1e-4.
    lr: 5e-5
    weight_decay: 0.05

  # frozen_module_names is null — PEFT marks all non-LoRA aggregator params as non-trainable.
  frozen_module_names: null

  amp:
    enabled: True
    amp_dtype: bfloat16

  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["aggregator"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["depth"]
        max_norm: 0.5          # Tightened from 1.0 — depth grads were hitting 388 pre-clip
        norm_type: 2
      - module_name: ["camera"]
        max_norm: 0.5          # Tightened from 1.0 — Grad/camera was hitting 360 pre-clip, far more volatile than depth
        norm_type: 2
      - module_name: ["track"]
        max_norm: 1.0
        norm_type: 2

  lora:
    # Full pretrained VGGT checkpoint. Loaded BEFORE PEFT wrapping so base-layer key names match.
    pretrained_checkpoint_path: /workspace/low_parallax_vggt/model.pt
    # LoRA rank. r=16 is a good starting point — increase to 32 if underfitting.
    r: 16
    # Effective LR scale = lora_alpha / r = 32 / 16 = 2.
    lora_alpha: 32
    # Target the attention projection layers in every aggregator block.
    # qkv: fused Q+K+V linear (dim → dim×3)
    # proj: attention output projection (dim → dim)
    target_modules:
      - qkv
      - proj
    lora_dropout: 0.0
    # fresh_heads: False — keep pretrained depth+camera heads (domain fine-tuning, not ablation).
    # Set True only to ablate: LoRA aggregator + random heads from scratch.
    fresh_heads: False

  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-8
              end_value: 5e-5
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: 5e-5
              end_value: 1e-8
          lengths: [0.05, 0.95]
          interval_scaling: ['rescaled', 'rescaled']
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.05


max_epochs: 100   # Small dataset (83 seqs) — more epochs to compensate for limited diversity


model:
  _target_: vggt.models.vggt.VGGT
  enable_camera: True
  enable_depth: True
  enable_point: False
  enable_track: True


distributed:
  backend: nccl
  comms_dtype: None
  # False: PEFT marks all frozen aggregator params as non-trainable → DDP sees no unused params.
  find_unused_parameters: False
  timeout_mins: 30
  gradient_as_bucket_view: True
  bucket_cap_mb: 25
  broadcast_buffers: True

cuda:
  cudnn_deterministic: False
  cudnn_benchmark: False
  allow_tf32: True
