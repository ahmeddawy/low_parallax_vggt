apiVersion: batch/v1
kind: Job
metadata:
  generateName: dawy-vggt-eval2d-
  labels:
    jobgroup: dawy-gpu-a100-8x-jobgroup
    experiment: eval-2d
spec:
  template:
    metadata:
      annotations:
        gke-gcsfuse/volumes: "true"
    spec:
      restartPolicy: Never
      containers:
        - name: research
          image: us-central1-docker.pkg.dev/rembrand-ai/rembrand-repo/vggt-training:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              eval '/usr/sbin/sshd -D &'
              git clone https://github.com/ahmeddawy/low_parallax_vggt.git /workspace/vggt
              cd /workspace/vggt && git checkout plane-rigidity
              pip install -e /workspace/vggt -q

              # Vanilla VGGT-1B checkpoint
              mkdir -p /workspace/low_parallax_vggt
              wget -q -O /workspace/low_parallax_vggt/model.pt \
                "https://huggingface.co/facebook/VGGT-1B/resolve/main/model.pt"

              DATASET=/mnt/bucket/dawy/vggt_finetune/tracking_whisper_clean_dataset
              VANILLA=/workspace/low_parallax_vggt/model.pt
              BASE=/mnt/bucket/dawy/law_parallax_vggt_exp2

              # ---------------------------------------------------------------
              # EXP-06  ep90  (track + reproj + plane_rigidity)
              # ---------------------------------------------------------------
              CKPT_EXP06=$BASE/reproj_plane/rembrand_lora_r16_reproj_plane_v1/ckpts/checkpoint_90.pt
              OUT_EXP06=$BASE/reproj_plane/rembrand_lora_r16_reproj_plane_v1/eval_ep90
              mkdir -p $OUT_EXP06
              echo "=== EXP-06 ep90 ===" | tee -a $OUT_EXP06/eval.log
              python /workspace/vggt/eval_track_head.py \
                --vanilla-ckpt     $VANILLA \
                --finetuned-ckpt   $CKPT_EXP06 \
                --lora \
                --dataset-dir      $DATASET \
                --train-split-file $DATASET/train_split.txt \
                --val-split-file   $DATASET/val_split.txt \
                --train-max-seqs   -1 \
                --vis-max-seqs     -1 \
                --vis-n-tracks     50 \
                --ransac-thresh    3.0 \
                --output-json      $OUT_EXP06/track_eval_results.json \
                --vis-dir          $OUT_EXP06/track_eval_viz \
                --homography-dir   $OUT_EXP06/homographies \
                --ae-output-dir    $OUT_EXP06/ae_output \
                2>&1 | tee -a $OUT_EXP06/eval.log
              echo "=== EXP-06 done ===" | tee -a $OUT_EXP06/eval.log

              # ---------------------------------------------------------------
              # EXP-07  ep70  (track + depth_consistency — track-only baseline)
              # ---------------------------------------------------------------
              CKPT_EXP07=$BASE/depth_consistency/rembrand_lora_r16_depth_consistency_v1/ckpts/checkpoint_70.pt
              OUT_EXP07=$BASE/depth_consistency/rembrand_lora_r16_depth_consistency_v1/eval_ep70
              mkdir -p $OUT_EXP07
              echo "=== EXP-07 ep70 ===" | tee -a $OUT_EXP07/eval.log
              python /workspace/vggt/eval_track_head.py \
                --vanilla-ckpt     $VANILLA \
                --finetuned-ckpt   $CKPT_EXP07 \
                --lora \
                --dataset-dir      $DATASET \
                --train-split-file $DATASET/train_split.txt \
                --val-split-file   $DATASET/val_split.txt \
                --train-max-seqs   -1 \
                --vis-max-seqs     -1 \
                --vis-n-tracks     50 \
                --ransac-thresh    3.0 \
                --output-json      $OUT_EXP07/track_eval_results.json \
                --vis-dir          $OUT_EXP07/track_eval_viz \
                --homography-dir   $OUT_EXP07/homographies \
                --ae-output-dir    $OUT_EXP07/ae_output \
                2>&1 | tee -a $OUT_EXP07/eval.log
              echo "=== EXP-07 done ===" | tee -a $OUT_EXP07/eval.log

              # ---------------------------------------------------------------
              # EXP-08  ep35  (track + reproj + depth_consistency, last clean ckpt)
              # ---------------------------------------------------------------
              CKPT_EXP08=$BASE/track_depth_reproj/rembrand_lora_r16_track_depth_reproj_v1/ckpts/checkpoint_35.pt
              OUT_EXP08=$BASE/track_depth_reproj/rembrand_lora_r16_track_depth_reproj_v1/eval_ep35
              mkdir -p $OUT_EXP08
              echo "=== EXP-08 ep35 ===" | tee -a $OUT_EXP08/eval.log
              python /workspace/vggt/eval_track_head.py \
                --vanilla-ckpt     $VANILLA \
                --finetuned-ckpt   $CKPT_EXP08 \
                --lora \
                --dataset-dir      $DATASET \
                --train-split-file $DATASET/train_split.txt \
                --val-split-file   $DATASET/val_split.txt \
                --train-max-seqs   -1 \
                --vis-max-seqs     -1 \
                --vis-n-tracks     50 \
                --ransac-thresh    3.0 \
                --output-json      $OUT_EXP08/track_eval_results.json \
                --vis-dir          $OUT_EXP08/track_eval_viz \
                --homography-dir   $OUT_EXP08/homographies \
                --ae-output-dir    $OUT_EXP08/ae_output \
                2>&1 | tee -a $OUT_EXP08/eval.log
              echo "=== EXP-08 done ===" | tee -a $OUT_EXP08/eval.log

              echo "=== All 2D evals complete ==="
              sleep infinity
          volumeMounts:
            - mountPath: /mnt/bucket
              name: bucket
            - mountPath: /mnt/nfs
              name: volume
            - mountPath: /dev/shm
              name: dshm
          ports:
            - name: ssh
              containerPort: 22
              protocol: TCP
          resources:
            limits:
              cpu: 16
              memory: 200Gi
              nvidia.com/gpu: 1
      nodeSelector:
        cloud.google.com/gke-nodepool: gpu-nodes-a100-80gb-8x-flex
        cloud.google.com/gke-flex-start: "true"
        iam.gke.io/gke-metadata-server-enabled: "true"
      serviceAccountName: gke-node-k8s-sa
      volumes:
        - name: volume
          persistentVolumeClaim:
            claimName: diffusion
        - name: bucket
          persistentVolumeClaim:
            claimName: gcs-fuse-csi-static-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 64Gi
